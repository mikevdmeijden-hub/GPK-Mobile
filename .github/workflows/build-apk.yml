name: APK bouwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Java instellen
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter instellen
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Oude Android-bestanden verwijderen
        run: |
          rm -f android/build.gradle android/settings.gradle android/gradle.properties
          rm -f android/app/build.gradle
          rm -f android/app/src/main/AndroidManifest.xml
          rm -rf android/app/src/main/kotlin android/app/src/main/java
          echo "Oude bestanden verwijderd."

      - name: Android-projectbestanden genereren
        run: flutter create . --platforms=android --project-name gpk_app --org nl.gpk

      - name: Manifest aanpassen (internet + app-naam)
        run: python3 patch_manifest.py

      - name: Pakketten ophalen
        run: flutter pub get

      - name: APK bouwen (release)
        run: flutter build apk --release

      - name: APK als download beschikbaar maken
        uses: actions/upload-artifact@v4
        with:
          name: GPK-Parkeren-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
