name: APK bouwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Java instellen
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter instellen
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Android-projectbestanden genereren
        run: flutter create . --platforms=android --project-name gpk_app --org nl.gpk

      - name: Internet-toestemming toevoegen
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i 's#<manifest\(.
